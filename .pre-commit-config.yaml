repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_checkov
        args:
          - --args=--skip-check=CKV_TF_1
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true
          - --hook-config=--use-standard-markers=true
      - id: terraform_tflint
      - id: terraform_trivy
        exclude: (^|/)\.terraform/
        args:
          - --args=--ignorefile=__GIT_WORKING_DIR__/.trivyignore
          - --args=--skip-dirs=**/.terraform

  - repo: local
    hooks:
      - id: infracost_baseline
        name: Generate infracost-base.json
        language: system
        pass_filenames: false
        always_run: true
        entry: bash -c "infracost breakdown --path=. --format=json | python3 -c \"import json,sys; d=json.load(sys.stdin); [d.pop(k,None) for k in ['timeGenerated','metadata']]; print(json.dumps(d,indent=2))\" > infracost-base.json"

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: infracost_breakdown
        verbose: true
        pass_filenames: false
        always_run: true
        args:
          - --args=--path=.
